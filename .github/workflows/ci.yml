name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync Python deps
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Build hh_parser extension
        run: uv run maturin develop --manifest-path ../../crates/hh-parser/Cargo.toml

      - name: Rust parser tests
        run: cargo test --manifest-path ../../crates/hh-parser/Cargo.toml

      - name: Python tests
        run: uv run pytest

  deploy:
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        run: |
          npm i -g @railway/cli
          railway up --service api --detach
